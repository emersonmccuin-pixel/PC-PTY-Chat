<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PC-PTY-Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <div class="title">PC-PTY-Chat</div>
      <div id="status" class="status state-spawning">spawning</div>
      <div id="mcp-status" class="mcp-pill mcp-down" title="MCP server status">MCP: —</div>
      <button id="channel-send" type="button" title="POST a message to the webhook channel">send channel event</button>
      <button id="interrupt" type="button" title="Send Ctrl+C">interrupt</button>
    </header>

    <main>
      <aside class="pane pane-sidebar" aria-label="worktrees">
        <header class="pane-header">
          worktrees
          <button id="wt-create" type="button" title="Create a worktree">+</button>
        </header>
        <div id="wt-list" class="wt-list">
          <div class="wt-empty">no worktrees</div>
        </div>
        <header class="pane-header pane-subheader">work items</header>
        <div id="wi-list" class="wi-list">
          <div class="wi-empty">no work items</div>
        </div>
        <header class="pane-header pane-subheader">
          workflows
          <button id="wf-reload" type="button" title="Reload workflow YAMLs">↻</button>
        </header>
        <div id="wf-list" class="wf-list">
          <div class="wf-empty">no workflows</div>
        </div>
        <header class="pane-header pane-subheader">pending approvals</header>
        <div id="approvals-list" class="approvals-list">
          <div class="approvals-empty">no pending approvals</div>
        </div>
      </aside>
      <section class="pane pane-chat" aria-label="chat view">
        <header class="pane-header">chat (from hook stream)</header>
        <div id="chat" class="chat-log"></div>
      </section>
      <section class="pane pane-term" aria-label="terminal view">
        <header class="pane-header">terminal (raw PTY)</header>
        <div id="term"></div>
      </section>
    </main>

    <footer>
      <textarea
        id="input"
        rows="3"
        placeholder="Type a message. Enter to send. Shift+Enter for newline."
        autocomplete="off"
        autofocus
      ></textarea>
      <button id="send" type="button">send</button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
