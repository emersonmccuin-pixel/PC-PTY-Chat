name: Desktop macOS Unsigned Installer

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to package"
        required: false
        default: "main"
      release_tag:
        description: "Optional GitHub Release tag to attach unsigned macOS installers to"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  macos-unsigned:
    name: macOS unsigned DMG and ZIP
    runs-on: macos-latest
    timeout-minutes: 75
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop app
        run: pnpm --filter @pc/desktop typecheck

      - name: Configure unsigned macOS build
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'apps/desktop/package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.build.artifactName = '${productName}-${version}-${os}-${arch}-unsigned.${ext}';
          pkg.build.mac = {
            ...pkg.build.mac,
            identity: null,
            hardenedRuntime: false,
            notarize: false,
          };
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          NODE

      - name: Build unsigned macOS installers
        run: pnpm desktop:dist:mac

      - name: Upload unsigned macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: caisson-macos-unsigned-installer
          path: |
            apps/desktop/release/*-unsigned.dmg
            apps/desktop/release/*-unsigned.zip
            apps/desktop/release/*-unsigned.dmg.blockmap
            apps/desktop/release/*-unsigned.zip.blockmap
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: Attach unsigned macOS installers to GitHub Release
    if: inputs.release_tag != ''
    needs:
      - macos-unsigned
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download unsigned macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/installers
          pattern: caisson-macos-unsigned-installer
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Caisson ${{ inputs.release_tag }}
          files: dist/installers/**
          fail_on_unmatched_files: true
