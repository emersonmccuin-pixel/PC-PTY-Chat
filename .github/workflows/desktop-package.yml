name: Desktop Package Smoke

on:
  pull_request:
    paths:
      - ".github/workflows/desktop-package.yml"
      - ".github/workflows/desktop-installers.yml"
      - "apps/**"
      - "channel-server/**"
      - "packages/**"
      - "templates/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/desktop-package.yml"
      - ".github/workflows/desktop-installers.yml"
      - "apps/**"
      - "channel-server/**"
      - "packages/**"
      - "templates/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop app
        run: pnpm --filter @pc/desktop typecheck

      - name: Typecheck Playwright specs
        run: pnpm test:playwright:types

      - name: Build unpacked desktop app
        run: pnpm desktop:dist:dir

      - name: Upload unpacked app
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: caisson-${{ runner.os }}-unpacked
          path: apps/desktop/release/
          if-no-files-found: error
          retention-days: 7
