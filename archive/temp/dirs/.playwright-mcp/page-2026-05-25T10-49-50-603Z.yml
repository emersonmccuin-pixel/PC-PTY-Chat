                    - listitem [ref=e220]:
                      - strong [ref=e221]: Ignore precedent until you've reasoned it out.
                      - text: Patterns and frameworks are compressed solutions to someone else's problem. Check if your problem is actually the same one before borrowing.
                    - listitem [ref=e222]:
                      - strong [ref=e223]: Question every layer.
                      - text: "\"Why do we need an ORM here?\" \"Why a queue?\" \"Why a microservice?\" Each layer should justify itself against the requirement, not against \"this is how it's done.\""
