                    - paragraph [ref=e168]:
                      - strong [ref=e169]: A persistent project chat.
                      - text: You talk to one orchestrator (me) that knows your whole project — your tasks, your history, what's in flight. It doesn't reset between sessions. The conversation
                      - emphasis [ref=e170]: is
                      - text: the memory.
                  - listitem [ref=e171]:
                    - paragraph [ref=e172]:
                      - strong [ref=e173]: A board of work.
                      - text: Cards move through stages (draft → review → done, or whatever your project needs). Like a kanban, but the orchestrator can read and move them as you talk.
                  - listitem [ref=e174]:
                    - paragraph [ref=e175]:
                      - strong [ref=e176]: Agents that do the work.
                      - text: You don't do everything in the chat yourself. The orchestrator dispatches specialist agents — a researcher, a writer, a code-writer, a reviewer — to go off and actually produce things. They're the hands; you and the orchestrator are the brain.
                  - listitem [ref=e177]:
                    - paragraph [ref=e178]:
                      - strong [ref=e179]: Workflows for the repeatable stuff.
                      - text: When a process runs the same way every time (e.g. "card hits Review → kick off a review pass"), you set it up once by
                      - emphasis [ref=e180]: describing it in plain English
                      - text: — not by wiring boxes together like Zapier. It fires automatically.
                  - listitem [ref=e181]:
                    - paragraph [ref=e182]:
                      - strong [ref=e183]: Built for everyone, not just devs.
                      - text: Complexity is hidden by default and exposed only when you ask for it. An SDR, a recruiter, or a PM can drive it without touching code or jargon.
                - paragraph [ref=e184]:
                  - text: "The pitch in one line:"
                  - strong [ref=e185]: it's the single place where you say what you want, and the right work gets done — by you, by agents, or by automation — without you juggling tools.
