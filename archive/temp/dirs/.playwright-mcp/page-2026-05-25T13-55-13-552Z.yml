        - generic [ref=e449]:
          - heading "Project Companion" [level=1] [ref=e450]
          - paragraph [ref=e451]: Build your own AI workflows by talking to Claude. No code. No prompt engineering. No terminal. No waiting.
          - separator [ref=e452]
          - heading "The problem" [level=2] [ref=e453]
          - paragraph [ref=e454]: AI at work is gated by tech fluency.
          - paragraph [ref=e455]:
            - text: The people who know what
            - code [ref=e456]: CLAUDE.md
            - text: is, how to write a skill, how to wire up an MCP server — they get real leverage. They turn AI into a teammate that actually knows their job. Everyone else gets a chat window and starts over every conversation.
          - paragraph [ref=e457]: Engineers built that leverage for themselves a year ago. The rest of the org is still waiting their turn.
          - heading "What this is" [level=2] [ref=e458]
          - paragraph [ref=e459]: A local app where anyone in your organization builds their own AI workflows by talking to Claude.
          - paragraph [ref=e460]: "A real GUI — click, drag, type. No commands, no config files, no editing JSON. You describe what you do in plain English; Companion turns it into something repeatable: an agent with the right tools, the context it needs, your steps in the right order. You run it on demand. You tweak it the same way you built it."
          - paragraph [ref=e461]: You are the expert on how the work should be done. Companion captures your method so you stop redoing it from scratch every time.
          - heading "What it looks like in practice" [level=2] [ref=e462]
          - paragraph [ref=e463]:
            - strong [ref=e464]: Data analyst.
            - text: You answer the same handful of questions every week — "how's funnel conversion trending," "which channels are softening," "what broke in last night's run." Today that means re-explaining to Claude where the data lives, what your semantic layer is, what "active user" actually means in your warehouse.
          - paragraph [ref=e465]:
            - text: In Companion you build a
            - strong [ref=e466]: pod
            - text: . It holds the credentials, the schema, an example query, the semantic-layer rules — and the workflow that walks the agent through how you'd answer. Call the pod. The answer comes back built the way you'd build it, every time.
          - paragraph [ref=e467]:
            - strong [ref=e468]: Sales follow-up.
            - text: "After every customer call you do the same thing: pull the Gong transcript, read it for questions and concerns, line them up against your product's answers, write a follow-up email in your voice."
          - paragraph [ref=e469]: In Companion this is a pod too. The product context, your voice samples, your standard answers to common objections — bundled with the workflow that does the pulling, parsing, matching, and drafting. You ship the email twenty minutes after the call instead of two days later, and it sounds like you wrote it.
          - heading "How it works" [level=2] [ref=e470]
          - paragraph [ref=e471]: Five pieces. You build them all by chatting.
          - list [ref=e472]:
            - listitem [ref=e473]:
              - strong [ref=e474]: Projects
              - text: scope the work. One per initiative, with its own chat, board, pods, and agents.
            - listitem [ref=e475]:
              - strong [ref=e476]: Pods
              - text: are the repeatable engine. A bundle of a workflow plus everything it needs to run — context, credentials, files, the agent that does the job. Lives in its own tab. Built once, run forever.
            - listitem [ref=e477]:
              - strong [ref=e478]: Workflows
              - text: are the steps. A repeatable sequence — what runs when, in what order, with what tools. Lives inside a pod for repeatable work, or runs free from chat for one-offs.
            - listitem [ref=e479]:
              - strong [ref=e480]: Agents
              - text: are your library of specialists. A data analyst, a researcher, a copy editor — each tuned for one role, each with its own tools.
            - listitem [ref=e481]:
              - strong [ref=e482]: Work items
              - text: are the kanban side. Cards moving through stages, for the day-to-day work that isn't yet a pod.
          - paragraph [ref=e483]: The chat is where you build and run. The board surfaces what's in flight. The pods tab is the production line.
          - heading "Building a workflow" [level=2] [ref=e484]
          - paragraph [ref=e485]: You don't need to know n8n. You don't need to know Zapier. You don't need to map a node graph, write a YAML config, or learn what a webhook is.
          - paragraph [ref=e486]: You have a conversation.
          - paragraph [ref=e487]: "The chat has an interview tool that walks you through it:"
          - list [ref=e488]:
            - listitem [ref=e489]:
              - strong [ref=e490]: What do you want it to do?
            - listitem [ref=e491]:
              - strong [ref=e492]: What triggers it?
              - text: Moves to a stage on the board, called manually, on a schedule.
            - listitem [ref=e493]:
              - strong [ref=e494]: What has to happen?
              - text: The steps, in your words.
            - listitem [ref=e495]:
              - strong [ref=e496]: What secrets does it need?
              - text: API keys, credentials, logins to anything it has to reach.
            - listitem [ref=e497]:
              - strong [ref=e498]: What does review look like?
              - text: Draft for your approval, auto-send, file as a card, ping someone for sign-off.
            - listitem [ref=e499]:
              - strong [ref=e500]: What's the expected output?
              - text: An email, a report, a Slack message, a row in a sheet, a new card on the board.
          - paragraph [ref=e501]: You answer in plain English. Companion writes the workflow. You run it. If something needs to change, you tell it — same chat, same conversation — and it adjusts.
          - paragraph [ref=e502]:
            - strong [ref=e503]: Agents are built the same way.
            - text: Click
            - strong [ref=e504]: + Create Agent
            - text: in Project Settings and you get an interview that walks you through purpose, what the agent should produce, where the output goes (a draft attached to a card, a new card, an external message, a file in the repo), which model and tools it needs, and a name. Plain English in, complete agent file out. No YAML, no system prompt to hand-write.
          - paragraph [ref=e505]: The person who knows how the job should be done is finally the one operating the tool. No translator, no specialist, no waiting.
          - heading "What it costs" [level=2] [ref=e506]
          - paragraph [ref=e507]: Your existing Claude subscription. Companion uses it directly — same login, same plan, no extra billing.
