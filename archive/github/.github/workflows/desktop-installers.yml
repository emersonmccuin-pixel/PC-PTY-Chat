name: Desktop Installers

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to package"
        required: false
        default: "main"
      release_tag:
        description: "Optional GitHub Release tag to attach installers to, for example v0.0.1"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  windows:
    name: Windows NSIS installer
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure optional Windows signing
        shell: pwsh
        run: |
          if ($env:WIN_CSC_LINK -and -not $env:WIN_CSC_KEY_PASSWORD) {
            throw "WIN_CSC_KEY_PASSWORD is required when WIN_CSC_LINK is set."
          }
          if ($env:WIN_CSC_LINK) {
            "CSC_LINK=$env:WIN_CSC_LINK" >> $env:GITHUB_ENV
            "CSC_KEY_PASSWORD=$env:WIN_CSC_KEY_PASSWORD" >> $env:GITHUB_ENV
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop app
        run: pnpm --filter @pc/desktop typecheck

      - name: Build Windows installer
        run: pnpm desktop:dist:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: caisson-windows-installer
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/*.yml
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macOS signed DMG and ZIP
    runs-on: macos-latest
    timeout-minutes: 75
    env:
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate macOS signing secrets
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"
          test -n "$APPLE_API_KEY_P8"

      - name: Write App Store Connect API key
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop app
        run: pnpm --filter @pc/desktop typecheck

      - name: Build signed and notarized macOS installers
        run: pnpm desktop:dist:mac

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: caisson-macos-installer
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/*.yml
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: Attach installers to GitHub Release
    if: inputs.release_tag != ''
    needs:
      - windows
      - macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/installers
          pattern: caisson-*-installer
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Caisson ${{ inputs.release_tag }}
          files: dist/installers/**
          fail_on_unmatched_files: true
