name: Desktop Release

# Push a tag like v0.0.2 (matching apps/desktop/package.json "version") to
# build signed installers and publish them to a GitHub Release. electron-builder
# uploads the installer + latest.yml / latest-mac.yml + .blockmap — exactly the
# feed electron-updater reads, so the running app's "Check for updates" then
# sees the new build. Both platforms publish to the same release (named for the
# package version).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to package (defaults to the triggering tag/branch)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  windows:
    name: Windows NSIS installer
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure optional Windows signing
        shell: pwsh
        run: |
          if ($env:WIN_CSC_LINK -and -not $env:WIN_CSC_KEY_PASSWORD) {
            throw "WIN_CSC_KEY_PASSWORD is required when WIN_CSC_LINK is set."
          }
          if ($env:WIN_CSC_LINK) {
            "CSC_LINK=$env:WIN_CSC_LINK" >> $env:GITHUB_ENV
            "CSC_KEY_PASSWORD=$env:WIN_CSC_KEY_PASSWORD" >> $env:GITHUB_ENV
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop app
        run: pnpm --filter @pc/desktop typecheck

      - name: Build and publish Windows installer
        run: pnpm desktop:publish:win

  macos:
    name: macOS signed DMG and ZIP
    runs-on: macos-latest
    timeout-minutes: 75
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate macOS signing secrets
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"
          test -n "$APPLE_API_KEY_P8"

      - name: Write App Store Connect API key
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop app
        run: pnpm --filter @pc/desktop typecheck

      - name: Build and publish signed and notarized macOS installers
        run: pnpm desktop:publish:mac
