id: review-research
description: Two-node DAG fires on entry to "review". Researcher explores the worktree, then writes findings.md based on the prior node's output.
triggers:
  on_enter:
    stage_id: review
worktree: auto
nodes:
  - id: explore
    subagent: researcher
    prompt: |
      Explore the bound worktree. Use Read / Glob / Grep to list files and
      skim contents. Do NOT write anything to disk in this node.

      When done, call pc_complete_node with an output object containing:
        - fileCount   (number)        total file count in the worktree
        - summary     (string)        one-paragraph overview of what's there
        - notable     (array of strings) standout files or patterns

  - id: write-findings
    depends_on: [explore]
    subagent: researcher
    prompt: |
      Write `findings.md` in the worktree root summarising the prior
      exploration. Use Bash heredoc to CREATE the file (the Write tool is
      soft-blocked inside subagent turns); use Edit afterward to refine if
      you need to.

      Use this earlier exploration result to fill out the document:
      $explore.output

      Structure:
        # Findings
        ## Summary
        ## File count
        ## Notable

      When done, call pc_complete_node with output:
        - path  (string)   "findings.md"
        - bytes (number)   byte count of the file (run `wc -c findings.md`)
