id: approval-demo
description: Demonstrate the approval node — pause for a human response, then run a bash node that echoes whatever came back. Approve or reject; the bash node runs either way and surfaces the response.
triggers:
  callable: true
worktree: none
nodes:
  - id: confirm
    approval:
      message: Approve this demo workflow run?
      on_reject:
        prompt: Tell me what you'd change (this is a demo — answer either way; the next node continues regardless).

  - id: report
    depends_on: [confirm]
    bash: |
      echo "approved=$confirm.output.approved"
      echo "response=$confirm.output.response"
