id: generic-agent-runner
description: |
  One-shot agent dispatch. The orchestrator calls this when the user wants a
  single subagent invocation without authoring a custom workflow. Pass the
  agent name as `agent` and the prompt body as `prompt`.

  This workflow is the named target of the path-guard hook's `gate-workflow`
  deny message (Section 3 sub-phase 3h) — "Direct Task() blocked. Subagents
  are workflow-only — call `pc_run_workflow` instead. For one-off agent work
  without authoring a custom workflow, run the built-in 'generic-agent-runner'
  workflow."

triggers:
  callable: true
inputs:
  agent: string   # agent name (researcher / writer / reviewer / planner / extractor, or a project agent)
  prompt: string  # prompt body — what the agent should do
outputs:
  result: string  # the agent's final answer, surfaced back to the orchestrator
worktree: auto
nodes:
  - id: dispatch
    agent: $inputs.agent
    prompt: |
      $inputs.prompt

      When you are done, call pc_complete_node with output:
        - result (string) your final answer or summary

      If the work cannot be completed, call pc_node_failed with a
      one-sentence reason.
